name: Release
on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - run: pnpm nx build mat-extended
      - run: pnpm nx test mat-extended
      - run: pnpm nx lint mat-extended
      - run: npm install -g npm@latest

      - name: Publish Stable
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist/packages/mat-extended
          npm publish --provenance --access public

      - name: Publish Snapshot
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd dist/packages/mat-extended
          VERSION=$(node -p "require('./package.json').version")
          SNAPSHOT_VERSION="${VERSION}-snapshot.${SHORT_SHA}"
          npm version "${SNAPSHOT_VERSION}" --no-git-tag-version
          npm publish --provenance --access public --tag snapshot
