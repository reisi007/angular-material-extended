name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'
      - run: pnpm install
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - run: pnpm nx build mat-extended
      - run: pnpm nx test mat-extended
      - run: pnpm nx lint mat-extended
      - run: pnpm nx build demo
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm nx e2e demo-e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/demo-e2e/playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    needs: [test-and-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Publish to npm
        run: |
          cd dist/packages/mat-extended
          npm publish --provenance --access public

  deploy-demo:
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - uses: actions/configure-pages@v5
        id: configure-pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/apps/demo/browser
      - uses: actions/deploy-pages@v4
        id: deployment
