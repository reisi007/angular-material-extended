name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm nx test mat-extended
      - run: pnpm nx lint mat-extended
      - run: pnpm nx build mat-extended
      - run: pnpm nx build demo

  e2e:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm nx build mat-extended
      - run: pnpm nx build demo
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test --config=apps/demo-e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/demo-e2e/playwright-report
          retention-days: 14
