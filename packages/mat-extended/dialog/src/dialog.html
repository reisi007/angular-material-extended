<div
  [class]="'rui-dialog ' + dialogSizeClass()"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="headerId()"
  [attr.aria-describedby]="contentId()"
  cdkTrapFocus
>
  @if (config().headerTemplate) {
    <ng-container
      *ngTemplateOutlet="config().headerTemplate!; context: config().context"
    />
  } @else {
    <rui-dialog-header
      [id]="headerId()"
      [header]="config().header"
      [disableClose]="config().disableClose ?? false"
      (dismiss)="dismiss.emit()"
    />
  }

  <div class="rui-dialog__content" [id]="contentId()">
    @if (config().contentTemplate) {
      <ng-container
        *ngTemplateOutlet="config().contentTemplate!; context: config().context"
      />
    } @else if (config().template) {
      <ng-container
        *ngTemplateOutlet="config().template!; context: config().context"
      />
    } @else {
      <ng-content></ng-content>
    }
  </div>

  @if (config().footerTemplate) {
    <ng-container
      *ngTemplateOutlet="config().footerTemplate!; context: config().context"
    />
  } @else {
    <rui-dialog-footer />
  }
</div>
