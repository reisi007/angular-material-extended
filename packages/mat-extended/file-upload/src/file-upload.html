<input #fileInput type="file" class="sr-only" [multiple]="multiple()" [attr.accept]="accept()" (change)="onFilesSelected($event)" />
<div [class.opacity-50]="disabled()" [class.pointer-events-none]="disabled()">
  <rui-file-upload-dropzone
    [isDragOver]="isDragOver()"
    [dropzoneText]="dropzoneText()"
    [dragOverText]="dragOverText()"
    [browseText]="browseText()"
    [accept]="accept()"
    [maxSize]="maxSize()"
    [maxFiles]="maxFiles()"
    [multiple]="multiple()"
    [disabled]="disabled()"
    (filePickerOpen)="openFilePicker()"
  />

  @if (hasFiles()) {
    <div class="mt-4 flex flex-col gap-2" cdkDropList [cdkDropListDisabled]="!sortable()" (cdkDropListDropped)="onDropListDropped($event)">
      @for (item of files(); track item.id; let idx = $index) {
        <rui-file-upload-item
          [item]="item"
          [sortable]="sortable()"
          [dragStartDelay]="dragStartDelay()"
          [editable]="editable()"
          [editableExtension]="editableExtension()"
          [fileManagement]="fileManagement()"
          [editingItemId]="editingItemId()"
          [editInputValue]="editInputValue()"
          (remove)="onItemRemove(item.id)"
          (cancelUpload)="onItemCancelUpload(item.id)"
          (retry)="onItemRetry(item.id, item)"
          (startRename)="onItemStartRename(item)"
          (confirmRename)="onItemConfirmRename(item)"
          (cancelRename)="onItemCancelRename()"
          (editInputChange)="onItemEditInputChange($event)"
          (moveUp)="onItemMoveUp(idx)"
          (moveDown)="onItemMoveDown(idx)"
        />
      }
    </div>
  }

  @if (hasFiles() && !isUploading() && !autoUpload()) {
    <div class="mt-4 flex justify-center">
      <button type="button"
        class="px-6 py-2.5 text-sm font-medium border-none rounded-full bg-[var(--mat-sys-primary)] text-[var(--mat-sys-on-primary)] cursor-pointer transition-[background-color,opacity] duration-200 hover:not-disabled:bg-[var(--mat-sys-primary-fixed-dim)] disabled:opacity-40 disabled:cursor-not-allowed"
        (click)="startUpload()"
        [disabled]="!hasFiles()">
        {{ uploadButtonText() }} ({{ files().length }} Dateien)
      </button>
    </div>
  }

  @if (displayErrors().length > 0) {
    <div class="mt-4 space-y-1">
      @for (err of displayErrors(); track err.message) {
        <p class="text-xs text-[var(--mat-sys-error)] m-0 flex items-start gap-1">
          <span class="shrink-0">⚠</span>
          <span>{{ err.message }}</span>
        </p>
      }
    </div>
  }

  <rui-file-upload-progress
    [totalProgress]="totalProgress()"
    [isUploading]="isUploading()"
  />
</div>
