<input #fileInput type="file" class="rui-file-upload__input" [multiple]="multiple()" [attr.accept]="accept()" (change)="onFilesSelected($event)" />
<div [class.rui-file-upload--disabled]="disabled()">
  <rui-file-upload-dropzone
    [isDragOver]="isDragOver()"
    [dropzoneText]="dropzoneText()"
    [dragOverText]="dragOverText()"
    [browseText]="browseText()"
    [accept]="accept()"
    [maxSize]="maxSize()"
    [maxFiles]="maxFiles()"
    [multiple]="multiple()"
    [disabled]="disabled()"
    (filePickerOpen)="openFilePicker()"
  />

  @if (hasFiles()) {
    <div class="rui-file-upload__list" role="list" cdkDropList [cdkDropListDisabled]="!sortable()" [cdkDropListOrientation]="'vertical'" (cdkDropListDropped)="onDropListDropped($event)">
      @for (item of files(); track item.id; let idx = $index) {
        <rui-file-upload-item
          [item]="item"
          [sortable]="sortable()"
          [dragStartDelay]="dragStartDelay()"
          [editable]="editable()"
          [editableExtension]="editableExtension()"
          [fileManagement]="fileManagement()"
          [editingItemId]="editingItemId()"
          [editInputValue]="editInputValue()"
          (remove)="onItemRemove(item.id)"
          (cancelUpload)="onItemCancelUpload(item.id)"
          (retry)="onItemRetry(item.id, item)"
          (startRename)="onItemStartRename(item)"
          (confirmRename)="onItemConfirmRename(item)"
          (cancelRename)="onItemCancelRename()"
          (editInputChange)="onItemEditInputChange($event)"
          (moveUp)="onItemMoveUp(idx)"
          (moveDown)="onItemMoveDown(idx)"
        />
      }
    </div>
  }

  @if (hasFiles() && !isUploading() && !autoUpload()) {
    <div class="rui-file-upload__actions">
      <button type="button"
        class="rui-file-upload__upload-btn"
        (click)="startUpload()"
        [disabled]="!hasFiles()">
        {{ uploadButtonText() }} ({{ files().length }} Dateien)
      </button>
    </div>
  }

  @if (displayErrors().length > 0) {
    <div class="rui-file-upload__errors" aria-live="polite">
      @for (err of displayErrors(); track err.message) {
        <p class="rui-file-upload__error">
          <span>⚠</span>
          <span>{{ err.message }}</span>
        </p>
      }
    </div>
  }

  <rui-file-upload-progress
    [totalProgress]="totalProgress()"
    [isUploading]="isUploading()"
  />
</div>
