<nav
  aria-label="Breadcrumb"
  class="rui-breadcrumb"
>
  @for (crumb of breadcrumbs(); track crumb.url; let last = $last) {
    @if (!last) {
      <a
        [routerLink]="crumb.url"
        class="rui-breadcrumb__link"
      >
        @if (crumb.icon) {
          <mat-icon class="rui-breadcrumb__icon">{{ crumb.icon }}</mat-icon>
        }
        <span>{{ crumb.label }}</span>
      </a>
      <mat-icon class="rui-breadcrumb__separator">{{ separator() }}</mat-icon>
    } @else {
      <span class="rui-breadcrumb__current" aria-current="page">
        @if (crumb.icon) {
          <mat-icon class="rui-breadcrumb__icon">{{ crumb.icon }}</mat-icon>
        }
        <span>{{ crumb.label }}</span>
      </span>
    }
  }
</nav>
