<div class="rui-menu-panel">
  @for (item of items(); track $index; let idx = $index) {
    @if (item.separator) {
      <div class="rui-menu-separator"></div>
    } @else {
      <button class="rui-menu-item"
        [class.rui-menu-item--active]="activeIndex() === idx"
        [class.rui-menu-item--disabled]="item.disabled"
        [disabled]="item.disabled"
        (click)="onSelect(item)"
        (mouseenter)="activeIndex.set(idx)"
        role="menuitem"
        [attr.tabindex]="activeIndex() === idx ? '0' : '-1'">
        @if (item.icon) {
          <span class="rui-menu-item__icon">{{ item.icon }}</span>
        }
        <span class="rui-menu-item__label">{{ item.label }}</span>
        @if (item.children) {
          <span class="rui-menu-item__sub-arrow">›</span>
        }
      </button>
    }
  }
</div>
