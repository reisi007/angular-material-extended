<button class="rui-menu-button" (click)="toggle()" aria-label="Menu" aria-haspopup="true" [attr.aria-expanded]="isOpen()">
  <span class="rui-menu-button__line" [style.transform]="isOpen() ? 'translateY(6px) rotate(45deg)' : undefined"></span>
  <span class="rui-menu-button__line" [style.opacity]="isOpen() ? '0' : undefined"></span>
  <span class="rui-menu-button__line" [style.transform]="isOpen() ? 'translateY(-6px) rotate(-45deg)' : undefined"></span>
</button>
