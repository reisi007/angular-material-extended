<div
  class="relative overflow-hidden rounded-lg bg-[var(--mat-sys-surface-variant)]"
  [class.flex]="toolbarPosition() === 'left' || toolbarPosition() === 'right'"
  [class.flex-row]="toolbarPosition() === 'left' || toolbarPosition() === 'right'">
  @if (toolbarPosition() === 'top' || toolbarPosition() === 'left') {
    <rui-cropper-toolbar
      [imageLoaded]="imageLoaded()"
      [zoomLevel]="zoomLevel()"
      [rotationAngle]="rotationAngle()"
      [totalRotation]="rotation()"
      [isAspectRatioFixed]="isAspectRatioFixed()"
      [effectiveAspectRatio]="effectiveAspectRatio()"
      [rotationMin]="rotationMin()"
      [rotationMax]="rotationMax()"
      [orientation]="toolbarPosition() === 'left' || toolbarPosition() === 'right' ? 'vertical' : 'horizontal'"
      (zoomIn)="zoomIn()"
      (zoomOut)="zoomOut()"
      (rotateLeft)="rotateStep(-90)"
      (rotateRight)="rotateStep(90)"
      (rotationChange)="rotationAngle.set($event)"
      (rotationStart)="onRotateSliderStart()"
      (rotationEnd)="onRotateSliderEnd()"
      (aspectChange)="effectiveAspectRatio.set($event)"
    />
  }

  <div
    class="relative aspect-video overflow-hidden cursor-crosshair touch-none"
    [style.width]="widthStyle()"
    #viewport
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
  >
    <canvas #canvas class="absolute inset-0 w-full h-full block"
      [style.transform]="canvasTransform()"
      [style.transform-origin]="'center center'"
      [class.will-change-transform]="liveRotationDragging()"
    ></canvas>

    @if (imageLoaded()) {
      <div class="absolute overflow-hidden z-10"
        [style]="cropRectStyle()">
        <ng-content select="[ruiCropperOverlay]">
          <rui-cropper-grid-overlay />
        </ng-content>
      </div>
    }
  </div>

  @if (toolbarPosition() === 'bottom' || toolbarPosition() === 'right') {
    <rui-cropper-toolbar
      [imageLoaded]="imageLoaded()"
      [zoomLevel]="zoomLevel()"
      [rotationAngle]="rotationAngle()"
      [totalRotation]="rotation()"
      [isAspectRatioFixed]="isAspectRatioFixed()"
      [effectiveAspectRatio]="effectiveAspectRatio()"
      [rotationMin]="rotationMin()"
      [rotationMax]="rotationMax()"
      [orientation]="toolbarPosition() === 'left' || toolbarPosition() === 'right' ? 'vertical' : 'horizontal'"
      (zoomIn)="zoomIn()"
      (zoomOut)="zoomOut()"
      (rotateLeft)="rotateStep(-90)"
      (rotateRight)="rotateStep(90)"
      (rotationChange)="rotationAngle.set($event)"
      (rotationStart)="onRotateSliderStart()"
      (rotationEnd)="onRotateSliderEnd()"
      (aspectChange)="effectiveAspectRatio.set($event)"
    />
  }
</div>
