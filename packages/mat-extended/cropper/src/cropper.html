<div class="relative overflow-hidden rounded-lg bg-[var(--mat-sys-surface-variant)]">
  <div
    class="relative w-full aspect-video overflow-hidden cursor-crosshair touch-none"
    #viewport
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
  >
    <div class="absolute inset-0 flex items-center justify-center">
      <canvas #canvas></canvas>
    </div>

    <div class="absolute inset-0"
      [style.--rui-crop-x.%]="cropRectStyle().x"
      [style.--rui-crop-y.%]="cropRectStyle().y"
      [style.--rui-crop-w.%]="cropRectStyle().width"
      [style.--rui-crop-h.%]="cropRectStyle().height"
      [style.--rui-rotation.deg]="rotation()">
      <ng-content select="[ruiCropperOverlay]"></ng-content>
    </div>

    @if (imageLoaded()) {
      <div class="flex flex-wrap gap-4 p-3 px-4 bg-[var(--mat-sys-surface-container)] border-t border-[var(--mat-sys-outline-variant)]">
        <div class="flex items-center gap-2">
          <button type="button" class="inline-flex items-center justify-center w-8 h-8 border border-[var(--mat-sys-outline)] rounded bg-[var(--mat-sys-surface)] text-[var(--mat-sys-on-surface)] cursor-pointer text-base leading-none hover:bg-[var(--mat-sys-surface-container-high)]" (click)="zoomIn()" aria-label="Zoom in">+</button>
          <button type="button" class="inline-flex items-center justify-center w-8 h-8 border border-[var(--mat-sys-outline)] rounded bg-[var(--mat-sys-surface)] text-[var(--mat-sys-on-surface)] cursor-pointer text-base leading-none hover:bg-[var(--mat-sys-surface-container-high)]" (click)="zoomOut()" aria-label="Zoom out">-</button>
          <span class="min-w-[3ch] text-xs text-[var(--mat-sys-on-surface-variant)] tabular-nums">{{ zoomLevel() }}%</span>
        </div>

        <div class="flex items-center gap-2">
          <button type="button" class="inline-flex items-center justify-center w-8 h-8 border border-[var(--mat-sys-outline)] rounded bg-[var(--mat-sys-surface)] text-[var(--mat-sys-on-surface)] cursor-pointer text-base leading-none hover:bg-[var(--mat-sys-surface-container-high)]" (click)="rotate(-90)" aria-label="Rotate left">↺</button>
          <button type="button" class="inline-flex items-center justify-center w-8 h-8 border border-[var(--mat-sys-outline)] rounded bg-[var(--mat-sys-surface)] text-[var(--mat-sys-on-surface)] cursor-pointer text-base leading-none hover:bg-[var(--mat-sys-surface-container-high)]" (click)="rotate(90)" aria-label="Rotate right">↻</button>
          <input
            type="range"
            class="w-24 accent-[var(--mat-sys-primary)]"
            [min]="0"
            [max]="360"
            [step]="1"
            [value]="rotation()"
            (input)="onRotateSlider($event)"
            aria-label="Free rotation"
          />
          <span class="min-w-[3ch] text-xs text-[var(--mat-sys-on-surface-variant)] tabular-nums">{{ rotation() }}°</span>
        </div>

        @if (!isAspectRatioFixed()) {
          <div class="flex items-center gap-2">
            <label>
              Aspect:
              <select (change)="onAspectChange($event)" aria-label="Aspect ratio">
                <option value="free" [selected]="effectiveAspectRatio() === 'free'">Free</option>
                <option value="1:1" [selected]="effectiveAspectRatio() === '1:1'">1:1</option>
                <option value="4:3" [selected]="effectiveAspectRatio() === '4:3'">4:3</option>
                <option value="16:9" [selected]="effectiveAspectRatio() === '16:9'">16:9</option>
              </select>
            </label>
          </div>
        }
      </div>
    }
  </div>
</div>
